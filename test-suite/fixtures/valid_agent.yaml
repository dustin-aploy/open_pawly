metadata:
  id: support-basic
  name: Support Helper
  description: Handles common support requests and routes risky actions through explicit boundaries.

capabilities:
  - name: answer order status questions
    description: Answer common order status questions.
  - name: draft helpful reply
    description: Draft a safe support reply for a customer.
  - name: summarize customer issues
    description: Summarize a customer issue for follow-up.
  - name: publish_post
    description: Publish a prepared support or content update.

boundaries:
  allow:
    - answer order status questions
    - draft helpful reply
  review:
    - issue refunds
    - process refund
  block:
    - give legal advice
    - write legal answer
  smart:
    - action: publish_post
      description: Publish only after an additional policy review confirms it is safe.
